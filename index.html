<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>최우영씨푸드 매니저 발주 리스트</title>

<style>
:root{
  --bg:#f3f1f4;
  --card:#ffffff;
  --gold:#c99a3f;
  --gold-light:#f5d789;
  --gold-deep:#9d6a1f;
  --black:#0d0d0e;
  --text:#1f1f1f;
  --sub:#777;
  --line:#eeeeee;
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
}

button,input,textarea{
  font-family:inherit;
}

.screen{display:none;}
.screen.active{display:block;}

/* INTRO */
#intro{
  min-height:100vh;
  color:white;
  background:
    radial-gradient(circle at top,rgba(245,215,137,.22),transparent 36%),
    linear-gradient(rgba(0,0,0,.58),rgba(0,0,0,.72)),
    linear-gradient(135deg,#211707,#050505);
}

.intro-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 18px;
}

.intro-card{
  width:100%;
  max-width:540px;
  text-align:center;
}

.main-gold-title{
  font-family:Georgia,"Times New Roman",serif;
  font-size:34px;
  line-height:1.12;
  font-weight:900;
  letter-spacing:.8px;
  color:#e0b14d;
  background:linear-gradient(180deg,#fff0b9 0%,#d7a343 42%,#9b6720 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:
    0 0 18px rgba(245,215,137,.24),
    0 5px 18px rgba(0,0,0,.72);
}

.sub-gold-title{
  margin-top:12px;
  font-family:Georgia,"Times New Roman",serif;
  color:#f1cf7b;
  font-size:18px;
  font-weight:900;
  letter-spacing:1.8px;
  text-shadow:0 0 12px rgba(245,215,137,.28);
}

.ko-title{
  margin-top:16px;
  font-size:25px;
  font-weight:900;
  color:#fff8e8;
}

.intro-desc{
  margin:22px auto 28px;
  max-width:370px;
  line-height:1.55;
  color:#f4eee3;
  font-size:15px;
}

.store-panel{
  text-align:left;
  border:1px solid rgba(245,215,137,.50);
  border-radius:28px;
  padding:20px;
  background:rgba(255,255,255,.075);
  box-shadow:0 18px 50px rgba(0,0,0,.36);
}

.panel-title{
  color:#ffe6ab;
  font-size:17px;
  font-weight:900;
  margin-bottom:14px;
}

.store-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.store-btn{
  border:1px solid rgba(245,215,137,.52);
  background:rgba(255,255,255,.08);
  color:white;
  border-radius:18px;
  min-height:58px;
  padding:15px 10px;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
  touch-action:manipulation;
}

.store-btn.active{
  background:linear-gradient(135deg,#f5d789,#c99033);
  color:#241604;
  border:none;
}

.start-btn{
  width:100%;
  margin-top:18px;
  border:none;
  border-radius:20px;
  padding:18px;
  background:linear-gradient(135deg,#f5d789,#c99033);
  color:#261604;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  touch-action:manipulation;
}

.intro-foot{
  margin-top:15px;
  text-align:center;
  color:#f1dca6;
  font-size:14px;
  font-weight:800;
  line-height:1.45;
}

/* ORDER */
#order{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
}

.header{
  padding:22px 20px 14px;
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:62px;
  height:62px;
  border-radius:18px;
  background:linear-gradient(145deg,#1c1b1b,#000);
  color:#d9bb74;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:22px;
  flex-shrink:0;
}

.brand h1{
  margin:0;
  font-size:24px;
  font-weight:900;
}

.selected-store{
  display:inline-block;
  margin-top:8px;
  padding:8px 14px;
  border-radius:999px;
  background:#111;
  color:#fff;
  font-size:14px;
  font-weight:900;
}

.notice{
  margin:10px 18px 18px;
  background:#f7efd8;
  border:1px solid #dfc98d;
  border-radius:24px;
  padding:18px;
}

.notice-title{
  color:#a8832b;
  font-weight:900;
  font-size:18px;
}

.notice-sub{
  margin-top:10px;
  color:#7c6a3e;
  font-size:14px;
  line-height:1.45;
}

.wrap{
  padding:0 18px 140px;
}

.back{
  margin:2px 0 18px;
  border:none;
  background:transparent;
  color:#777;
  font-size:15px;
  text-decoration:underline;
  cursor:pointer;
}

.card{
  background:#fff;
  border-radius:28px;
  margin-bottom:18px;
  overflow:hidden;
  border:1px solid #ececec;
  box-shadow:0 2px 10px rgba(0,0,0,.03);
}

.card-title{
  padding:22px;
  font-size:20px;
  font-weight:900;
}

.items{
  border-top:1px solid #f1f1f1;
}

.item{
  display:grid;
  grid-template-columns:1fr 120px;
  gap:12px;
  align-items:center;
  padding:18px 22px;
  border-bottom:1px solid #f3f3f3;
}

.item:last-child{border-bottom:none;}

.item-name{
  font-size:17px;
  font-weight:750;
}

.qty-input{
  width:100%;
  height:46px;
  border-radius:18px;
  border:1px solid #e4e4e4;
  background:#fafafa;
  text-align:center;
  font-size:17px;
  font-weight:800;
  color:#111;
  padding:0 8px;
}

.memo{
  width:100%;
  min-height:72px;
  border-radius:18px;
  border:1px solid #e4e4e4;
  background:#fafafa;
  padding:13px;
  font-size:15px;
  resize:vertical;
}

.item.memo-item{
  grid-template-columns:1fr;
}

.result{
  margin-top:18px;
  background:#fff;
  border-radius:22px;
  padding:20px;
  font-size:15px;
  line-height:1.65;
  border:1px solid #ececec;
  white-space:pre-line;
}

.bottom{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:rgba(243,241,244,.96);
  padding:14px 18px 22px;
  display:flex;
  gap:12px;
  border-top:1px solid #e6e6e6;
}

.share{
  flex:1;
  border:none;
  background:#0c0c0d;
  color:white;
  border-radius:24px;
  font-size:20px;
  font-weight:900;
  padding:20px 10px;
  cursor:pointer;
}

.copy{
  width:92px;
  border:none;
  background:white;
  border-radius:24px;
  font-size:15px;
  font-weight:900;
  border:1px solid #ececec;
  cursor:pointer;
}
</style>
</head>

<body>

<section id="intro" class="screen active">
  <div class="intro-wrap">
    <div class="intro-card">
      <div class="main-gold-title">CHOI WOOYOUNG<br>SEAFOOD MANAGER</div>
      <div class="sub-gold-title">MANAGER ORDER LIST</div>
      <div class="ko-title">최우영씨푸드 매니저 리스트</div>
      <div class="intro-desc">
        매장을 선택하고 필요한 품목을 입력한 뒤<br>
        카카오톡 공유 또는 복사 붙여넣기로 전송하세요.
      </div>

      <div class="store-panel">
        <div class="panel-title">매장 선택</div>
        <div class="store-grid">
          <button class="store-btn" type="button" data-store="구로">구로</button>
          <button class="store-btn" type="button" data-store="가산">가산</button>
          <button class="store-btn" type="button" data-store="영등포">영등포</button>
          <button class="store-btn" type="button" data-store="여의도">여의도</button>
          <button class="store-btn" type="button" data-store="종로">종로</button>
          <button class="store-btn" type="button" data-store="씨푸드">씨푸드</button>
          <button class="store-btn" type="button" data-store="메모1">메모1</button>
          <button class="store-btn" type="button" data-store="메모2">메모2</button>
        </div>
        <button class="start-btn" id="startBtn" type="button">발주 리스트 시작</button>
        <div class="intro-foot">“하나의 기준이 모두를 편하게 만든다.”</div>
      </div>
    </div>
  </div>
</section>

<section id="order" class="screen">
  <div class="header">
    <div class="logo">CW</div>
    <div class="brand">
      <h1>관리자 발주 리스트</h1>
      <span id="selectedStoreLabel" class="selected-store"></span>
    </div>
  </div>

  <div class="notice">
    <div class="notice-title">💡 필요한 수량과 내용을 입력해주세요</div>
    <div class="notice-sub">입력한 품목만 한 줄씩 정리되어 복사됩니다.</div>
  </div>

  <div class="wrap">
    <button class="back" type="button" id="backBtn">← 매장 다시 선택</button>
    <div id="content"></div>

    <div class="card">
      <div class="card-title">✍️ 추가 메모</div>
      <div style="padding:0 22px 22px;">
        <textarea id="memo" class="memo" placeholder="예: 특이사항 입력"></textarea>
      </div>
    </div>

    <div class="result" id="result">생성된 문구가 여기에 표시됩니다.</div>
  </div>

  <div class="bottom">
    <button class="share" type="button" id="shareBtn">📲 카카오톡으로 공유</button>
    <button class="copy" type="button" id="copyBtn">복사</button>
  </div>
</section>

<script>
let currentStore = "";

const categories = [
  { 
    title:"🐟 생선회류", 
    items:["광어","참돔","연어","연어 바트","연어뱃살 바트","도다리","점성어","방어","우럭"],
    memo:false
  },
  { 
    title:"🦪 해산물", 
    items:["멍게","성게알 박스","전복"],
    memo:false
  },
  { 
    title:"🍲 포장 / 손질", 
    items:["서더리/도미머리 추가","서더리","도미머리","포장용 매운탕","매장용 매운탕 준비"],
    memo:true
  }
];

function show(id){
  document.querySelectorAll(".screen").forEach(function(s){
    s.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

function selectStore(btn){
  currentStore = btn.dataset.store;
  document.querySelectorAll(".store-btn").forEach(function(b){
    b.classList.remove("active");
  });
  btn.classList.add("active");
}

function startOrder(){
  if(!currentStore){
    alert("매장을 선택해주세요.");
    return;
  }
  document.getElementById("selectedStoreLabel").innerText = currentStore;
  renderItems();
  show("order");
}

function renderItems(){
  const content = document.getElementById("content");
  content.innerHTML = "";

  categories.forEach(function(cat, ci){
    const card = document.createElement("div");
    card.className = "card";

    let html = '<div class="card-title">' + cat.title + '</div><div class="items">';

    cat.items.forEach(function(item, ii){
      const id = 'input-' + ci + '-' + ii;

      if(cat.memo){
        html += '<div class="item memo-item">' +
          '<div class="item-name">' + item + '</div>' +
          '<textarea class="memo order-input" id="' + id + '" data-name="' + item + '" placeholder="내용 입력"></textarea>' +
          '</div>';
      }else{
        html += '<div class="item">' +
          '<div class="item-name">' + item + '</div>' +
          '<input class="qty-input order-input" id="' + id + '" data-name="' + item + '" placeholder="수량">' +
          '</div>';
      }
    });

    html += '</div>';
    card.innerHTML = html;
    content.appendChild(card);
  });
}

function generate(){
  const lines = [];

  document.querySelectorAll(".order-input").forEach(function(input){
    const value = input.value.trim();
    const name = input.dataset.name;

    if(value){
      lines.push(name + " : " + value);
    }
  });

  const memo = document.getElementById("memo").value.trim();

  let text = "";

  if(lines.length > 0){
    text = currentStore + "\\n" + lines.join("\\n");
  }else{
    text = currentStore + "\\n입력된 품목이 없습니다.";
  }

  if(memo){
    text += "\\n추가 메모 : " + memo;
  }

  document.getElementById("result").innerText = text;
  return text;
}

function copyText(){
  const text = generate();

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      alert("복사되었습니다.");
    }).catch(function(){
      fallbackCopy(text);
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const temp = document.createElement("textarea");
  temp.value = text;
  document.body.appendChild(temp);
  temp.select();
  document.execCommand("copy");
  document.body.removeChild(temp);
  alert("복사되었습니다.");
}

document.addEventListener("DOMContentLoaded", function(){
  document.querySelectorAll(".store-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      selectStore(btn);
    });
  });

  document.getElementById("startBtn").addEventListener("click", startOrder);
  document.getElementById("backBtn").addEventListener("click", function(){ show("intro"); });
  document.getElementById("shareBtn").addEventListener("click", generate);
  document.getElementById("copyBtn").addEventListener("click", copyText);
});
</script>

</body>
</html>
